{% extends "base.html" %}

{% block title %}Home{% endblock %}

{% block content %}

<form method="POST">
    <input type="text" name="task" placeholder="New task">
    <button type="submit">Add</button>
</form>

<ul>
{% for todo in todos %}
    <li>
        {{ todo }}
        <a href="/delete/{{ loop.index0 }}">Delete</a>
    </li>
{% endfor %}
</ul>

{% endblock %}
